server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html;

    # ── React SPA ─────────────────────────────────────────────────────────────
    # Todos los paths que no correspondan a un archivo estático real
    # caen al index.html (client-side routing).
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Proxy al backend ──────────────────────────────────────────────────────
    # ${BACKEND_URL} se sustituye en runtime vía envsubst (imagen oficial nginx).
    # docker-compose: BACKEND_URL=http://backend:8000
    # Render:         BACKEND_URL=https://<tu-backend>.onrender.com
    location /api/ {
        proxy_pass         ${BACKEND_URL};
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Timeout generoso: el solver puede tardar varios minutos
        proxy_connect_timeout 10s;
        proxy_send_timeout    60s;
        proxy_read_timeout    300s;
    }
}
